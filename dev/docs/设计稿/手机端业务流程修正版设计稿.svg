<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1220" viewBox="0 0 1900 1220">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .title { font: 800 34px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .section { font: 800 22px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .phone { fill: #0f172a; rx: 34; }
      .screen { fill: #f8fafc; rx: 26; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.2; rx: 18; }
      .field { fill: #ffffff; stroke: #d7dee9; stroke-width: 1.2; rx: 12; }
      .photo { fill: #e2e8f0; stroke: #cbd5e1; stroke-width: 1; rx: 14; }
      .primary { fill: #2563eb; rx: 14; }
      .secondary { fill: #eef2ff; rx: 14; }
      .neutral { fill: #f1f5f9; rx: 14; }
      .danger { fill: #fff1f2; rx: 14; }
      .h1 { font: 800 20px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .h2 { font: 700 16px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .text { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .muted { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .tiny { font: 11px "Microsoft YaHei", Arial, sans-serif; fill: #94a3b8; }
      .primaryText { font: 800 15px "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .secondaryText { font: 700 14px "Microsoft YaHei", Arial, sans-serif; fill: #2563eb; }
      .neutralText { font: 700 14px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .label { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .chipBlue { fill: #dbeafe; rx: 12; }
      .chipGreen { fill: #dcfce7; rx: 12; }
      .chipOrange { fill: #ffedd5; rx: 12; }
      .chipTextBlue { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
      .chipTextGreen { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #15803d; }
      .chipTextOrange { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #c2410c; }
      .arrow { stroke: #94a3b8; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .end { fill: #ecfdf5; stroke: #86efac; stroke-width: 1.5; rx: 18; }
      .endText { font: 800 15px "Microsoft YaHei", Arial, sans-serif; fill: #15803d; }
      .noteTitle { font: 800 18px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .note { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect class="bg" width="1900" height="1220"/>
  <text class="title" x="70" y="64">手机端样品采集 App 业务流程修正版</text>
  <text class="subtitle" x="70" y="96">三条独立路径：录入闭环、查看管理闭环、同步闭环。页面不互相强行串联。</text>

  <!-- Home -->
  <g transform="translate(70,160)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">样品采集</text>
    <text class="muted" x="34" y="82">个人本地使用 · 数据包同步</text>

    <rect class="primary" x="30" y="125" width="210" height="62"/>
    <text class="primaryText" x="94" y="162">录入</text>
    <text class="muted" x="72" y="182" fill="#dbeafe">新拍照并登记样品</text>

    <rect class="secondary" x="30" y="215" width="210" height="62"/>
    <text class="secondaryText" x="94" y="252">查看</text>
    <text class="muted" x="72" y="272">按项目查看已有样品</text>

    <rect class="neutral" x="30" y="305" width="210" height="62"/>
    <text class="neutralText" x="94" y="342">同步</text>
    <text class="muted" x="72" y="362">导出或导入同步包</text>

    <rect class="card" x="30" y="410" width="210" height="76"/>
    <text class="h2" x="48" y="440">当前数据</text>
    <text class="muted" x="48" y="462">项目 3 个 · 样品 28 条</text>
  </g>
  <text class="section" x="166" y="758">入口首页</text>

  <!-- Path 1 Entry -->
  <text class="section" x="410" y="145">路径一：录入 → 录入详情 → 结束</text>
  <g transform="translate(410,185)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">录入样品</text>
    <text class="muted" x="34" y="82">这条路径只负责新增采集</text>

    <rect class="photo" x="30" y="108" width="210" height="112"/>
    <text class="secondaryText" x="98" y="171">拍照</text>
    <text class="muted" x="83" y="194">自动生成预览</text>

    <text class="label" x="34" y="253">图片名称</text>
    <rect class="field" x="30" y="262" width="210" height="40"/>
    <text class="text" x="46" y="288">前壳样品</text>

    <text class="label" x="34" y="329">规格 / 产地</text>
    <rect class="field" x="30" y="338" width="100" height="40"/>
    <text class="text" x="46" y="364">20mm</text>
    <rect class="field" x="140" y="338" width="100" height="40"/>
    <text class="text" x="156" y="364">广东</text>

    <text class="label" x="34" y="405">价格 / 项目</text>
    <rect class="field" x="30" y="414" width="100" height="40"/>
    <text class="text" x="46" y="440">12.5</text>
    <rect class="field" x="140" y="414" width="100" height="40"/>
    <text class="text" x="156" y="440">项目 A</text>

    <rect class="primary" x="30" y="492" width="210" height="46"/>
    <text class="primaryText" x="104" y="521">确认</text>
  </g>

  <g transform="translate(730,185)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">录入详情</text>
    <text class="muted" x="34" y="82">保存成功后的结果页</text>

    <rect class="photo" x="55" y="108" width="160" height="140"/>
    <text class="h2" x="34" y="288">前壳样品</text>
    <text class="text" x="34" y="323">规格：20mm</text>
    <text class="text" x="34" y="354">产地：广东</text>
    <text class="text" x="34" y="385">价格：12.5</text>
    <text class="text" x="34" y="416">项目：项目 A</text>
    <text class="muted" x="34" y="448">已保存到手机本地</text>

    <rect class="secondary" x="30" y="486" width="100" height="46"/>
    <text class="secondaryText" x="57" y="515">再录一条</text>
    <rect class="primary" x="140" y="486" width="100" height="46"/>
    <text class="primaryText" x="174" y="515">完成</text>
  </g>

  <rect class="end" x="1050" y="410" width="120" height="58"/>
  <text class="endText" x="1094" y="445">结束</text>

  <path class="arrow" d="M340 440 C370 440, 380 440, 410 440"/>
  <path class="arrow" d="M680 440 C700 440, 710 440, 730 440"/>
  <path class="arrow" d="M1000 440 C1022 440, 1028 440, 1050 440"/>

  <!-- Path 2 View -->
  <text class="section" x="410" y="815">路径二：查看 → 项目列表 → 项目详情 → 具体产品详情（可调整） → 结束</text>
  <g transform="translate(410,855)" filter="url(#shadow)">
    <rect class="phone" width="270" height="310"/>
    <rect class="screen" x="12" y="12" width="246" height="286"/>
    <text class="h1" x="34" y="58">项目列表</text>
    <rect class="field" x="30" y="82" width="210" height="38"/>
    <text class="muted" x="48" y="106">搜索项目</text>
    <rect class="card" x="30" y="140" width="210" height="56"/>
    <text class="h2" x="48" y="166">项目 A</text>
    <text class="muted" x="48" y="186">12 条样品 · 3 条待同步</text>
    <rect class="card" x="30" y="210" width="210" height="56"/>
    <text class="h2" x="48" y="236">项目 B</text>
    <text class="muted" x="48" y="256">9 条样品</text>
  </g>

  <g transform="translate(730,855)" filter="url(#shadow)">
    <rect class="phone" width="270" height="310"/>
    <rect class="screen" x="12" y="12" width="246" height="286"/>
    <text class="h1" x="34" y="58">项目详情</text>
    <text class="muted" x="34" y="82">项目 A · 12 条样品</text>
    <rect class="photo" x="30" y="112" width="92" height="82"/>
    <rect class="photo" x="148" y="112" width="92" height="82"/>
    <text class="text" x="34" y="216">前壳样品</text>
    <text class="text" x="152" y="216">后壳样品</text>
    <text class="muted" x="34" y="238">广东 · 12.5</text>
    <text class="muted" x="152" y="238">浙江 · 8.0</text>
    <rect class="secondary" x="30" y="260" width="210" height="34"/>
    <text class="secondaryText" x="92" y="282">筛选 / 排序</text>
  </g>

  <g transform="translate(1050,855)" filter="url(#shadow)">
    <rect class="phone" width="270" height="310"/>
    <rect class="screen" x="12" y="12" width="246" height="286"/>
    <text class="h1" x="34" y="58">产品详情</text>
    <rect class="photo" x="34" y="82" width="92" height="82"/>
    <text class="h2" x="142" y="102">前壳样品</text>
    <rect class="chipOrange" x="142" y="118" width="62" height="24"/>
    <text class="chipTextOrange" x="154" y="135">可调整</text>
    <text class="text" x="34" y="190">规格：20mm</text>
    <text class="text" x="34" y="218">产地：广东</text>
    <text class="text" x="34" y="246">价格：12.5</text>
    <rect class="secondary" x="30" y="266" width="100" height="34"/>
    <text class="secondaryText" x="64" y="288">编辑</text>
    <rect class="primary" x="140" y="266" width="100" height="34"/>
    <text class="primaryText" x="174" y="288">保存</text>
  </g>

  <rect class="end" x="1385" y="980" width="120" height="58"/>
  <text class="endText" x="1429" y="1015">结束</text>

  <path class="arrow" d="M340 530 C375 700, 372 1010, 410 1010"/>
  <path class="arrow" d="M680 1010 C700 1010, 710 1010, 730 1010"/>
  <path class="arrow" d="M1000 1010 C1020 1010, 1030 1010, 1050 1010"/>
  <path class="arrow" d="M1320 1010 C1348 1010, 1358 1010, 1385 1010"/>

  <!-- Path 3 Sync -->
  <text class="section" x="1240" y="145">路径三：同步中心 → 同步 → 结束</text>
  <g transform="translate(1240,185)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">同步中心</text>
    <text class="muted" x="34" y="82">独立处理数据包</text>

    <rect class="card" x="30" y="112" width="210" height="92"/>
    <text class="h2" x="48" y="143">同步状态</text>
    <text class="muted" x="48" y="168">待导出：新增 5 · 修改 2</text>
    <text class="muted" x="48" y="190">上次导入：今天 10:30</text>

    <rect class="primary" x="30" y="238" width="210" height="54"/>
    <text class="primaryText" x="91" y="271">导出给电脑</text>

    <rect class="secondary" x="30" y="315" width="210" height="54"/>
    <text class="secondaryText" x="80" y="349">导入电脑同步包</text>

    <rect class="neutral" x="30" y="405" width="210" height="64"/>
    <text class="neutralText" x="76" y="432">同步完成提示</text>
    <text class="muted" x="58" y="454">新增 / 更新 / 冲突数量</text>
  </g>

  <rect class="end" x="1585" y="410" width="120" height="58"/>
  <text class="endText" x="1629" y="445">结束</text>

  <path class="arrow" d="M340 620 C730 760, 1120 600, 1240 460"/>
  <path class="arrow" d="M1510 440 C1540 440, 1555 440, 1585 440"/>

  <!-- Notes -->
  <g transform="translate(1240,600)">
    <rect class="card" x="0" y="0" width="465" height="210"/>
    <text class="noteTitle" x="26" y="42">业务边界说明</text>
    <text class="note" x="26" y="80">1. 录入路径保存后进入“录入详情”，用户确认后结束。</text>
    <text class="note" x="26" y="116">2. 查看路径从项目列表进入项目详情，再进入具体产品详情。</text>
    <text class="note" x="26" y="152">3. 产品详情允许调整字段，但不反向跳到录入流程。</text>
    <text class="note" x="26" y="188">4. 同步中心只处理导出和导入，完成后结束。</text>
  </g>
</svg>
