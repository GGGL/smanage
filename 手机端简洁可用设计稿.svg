<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .page { fill: #f3f6fb; }
      .title { font: 800 34px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px "Microsoft YaHei", Arial, sans-serif; fill: #6b7280; }
      .phone { fill: #0f172a; rx: 36; }
      .screen { fill: #f8fafc; rx: 28; }
      .bar { fill: #ffffff; }
      .h1 { font: 800 21px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .h2 { font: 700 17px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .text { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #374151; }
      .muted { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #6b7280; }
      .tiny { font: 11px "Microsoft YaHei", Arial, sans-serif; fill: #9ca3af; }
      .primary { fill: #2563eb; rx: 14; }
      .primaryText { font: 800 15px "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .secondary { fill: #eef2ff; rx: 14; }
      .secondaryText { font: 700 14px "Microsoft YaHei", Arial, sans-serif; fill: #2563eb; }
      .card { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; rx: 18; }
      .field { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.2; rx: 13; }
      .fieldLabel { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .fieldText { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .photo { fill: #e2e8f0; rx: 14; }
      .photoIcon { fill: none; stroke: #64748b; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .chip { fill: #eff6ff; rx: 12; }
      .chipText { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
      .line { stroke: #cbd5e1; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .navText { font: 11px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .navActive { font: 700 11px "Microsoft YaHei", Arial, sans-serif; fill: #2563eb; }
      .dot { fill: #2563eb; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#cbd5e1"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect class="page" width="1800" height="1180"/>
  <text class="title" x="70" y="70">手机端样品采集 App 简洁设计稿</text>
  <text class="subtitle" x="70" y="102">用于 Capacitor 打包 APK/iOS App 的手机端界面方向：现场快速采集、项目查看、双向同步。</text>

  <!-- phone component helper dimensions: 270 x 560, screen starts 12,12 size 246x536 -->

  <!-- Home -->
  <g transform="translate(70,155)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">样品采集</text>
    <text class="muted" x="34" y="82">今天新增 5 条 · 待导出 7 条</text>

    <rect class="primary" x="30" y="112" width="210" height="58"/>
    <text class="primaryText" x="94" y="148">开始录入</text>

    <rect class="secondary" x="30" y="185" width="100" height="52"/>
    <text class="secondaryText" x="57" y="217">查看</text>
    <rect class="secondary" x="140" y="185" width="100" height="52"/>
    <text class="secondaryText" x="168" y="217">同步</text>

    <rect class="card" x="30" y="266" width="210" height="96"/>
    <text class="h2" x="48" y="298">最近项目</text>
    <text class="text" x="48" y="326">项目 A</text>
    <text class="muted" x="48" y="348">12 条样品 · 10:30 更新</text>

    <rect class="card" x="30" y="380" width="210" height="76"/>
    <text class="h2" x="48" y="410">同步状态</text>
    <text class="muted" x="48" y="434">上次导入电脑包：昨天 18:12</text>

    <rect class="bar" x="12" y="494" width="246" height="54"/>
    <circle class="dot" cx="64" cy="514" r="4"/>
    <text class="navActive" x="48" y="536">首页</text>
    <text class="navText" x="114" y="536">项目</text>
    <text class="navText" x="178" y="536">同步</text>
  </g>
  <text class="h2" x="140" y="750">首页</text>

  <!-- Entry -->
  <g transform="translate(405,155)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">新增样品</text>
    <text class="muted" x="34" y="82">先拍照，再补充关键信息</text>

    <rect class="photo" x="30" y="108" width="210" height="116"/>
    <path class="photoIcon" d="M116 148 h38 l8 10 h20 a10 10 0 0 1 10 10 v24 a10 10 0 0 1-10 10 h-96 a10 10 0 0 1-10-10 v-24 a10 10 0 0 1 10-10 h20z"/>
    <circle class="photoIcon" cx="134" cy="180" r="16"/>
    <text class="secondaryText" x="105" y="252">拍照 / 选择图片</text>

    <text class="fieldLabel" x="34" y="286">图片名称</text>
    <rect class="field" x="30" y="296" width="210" height="42"/>
    <text class="fieldText" x="46" y="323">例如：前壳样品</text>

    <text class="fieldLabel" x="34" y="360">规格 / 产地</text>
    <rect class="field" x="30" y="370" width="100" height="42"/>
    <text class="fieldText" x="46" y="397">规格</text>
    <rect class="field" x="140" y="370" width="100" height="42"/>
    <text class="fieldText" x="156" y="397">产地</text>

    <text class="fieldLabel" x="34" y="434">价格 / 项目</text>
    <rect class="field" x="30" y="444" width="100" height="42"/>
    <text class="fieldText" x="46" y="471">价格</text>
    <rect class="field" x="140" y="444" width="100" height="42"/>
    <text class="fieldText" x="156" y="471">项目 A</text>

    <rect class="primary" x="30" y="504" width="210" height="44"/>
    <text class="primaryText" x="93" y="532">保存并继续</text>
  </g>
  <text class="h2" x="465" y="750">录入页</text>

  <!-- Project List -->
  <g transform="translate(740,155)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">项目</text>
    <rect class="field" x="30" y="83" width="210" height="40"/>
    <text class="muted" x="48" y="108">搜索项目或样品</text>

    <rect class="card" x="30" y="146" width="210" height="78"/>
    <text class="h2" x="48" y="177">项目 A</text>
    <text class="muted" x="48" y="201">12 条样品 · 待同步 3 条</text>
    <rect class="chip" x="170" y="165" width="50" height="24"/>
    <text class="chipText" x="183" y="181">进行中</text>

    <rect class="card" x="30" y="239" width="210" height="78"/>
    <text class="h2" x="48" y="270">项目 B</text>
    <text class="muted" x="48" y="294">9 条样品 · 已同步</text>

    <rect class="card" x="30" y="332" width="210" height="78"/>
    <text class="h2" x="48" y="363">项目 C</text>
    <text class="muted" x="48" y="387">7 条样品 · 待整理</text>

    <rect class="primary" x="30" y="444" width="210" height="46"/>
    <text class="primaryText" x="99" y="473">新建项目</text>

    <rect class="bar" x="12" y="494" width="246" height="54"/>
    <text class="navText" x="48" y="536">首页</text>
    <circle class="dot" cx="128" cy="514" r="4"/>
    <text class="navActive" x="114" y="536">项目</text>
    <text class="navText" x="178" y="536">同步</text>
  </g>
  <text class="h2" x="800" y="750">项目列表</text>

  <!-- Samples Gallery -->
  <g transform="translate(1075,155)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">项目 A</text>
    <text class="muted" x="34" y="82">12 条样品</text>

    <rect class="photo" x="30" y="112" width="96" height="96"/>
    <rect class="photo" x="144" y="112" width="96" height="96"/>
    <text class="text" x="35" y="233">前壳样品</text>
    <text class="text" x="149" y="233">后壳样品</text>
    <text class="muted" x="35" y="254">广东 · 12.5</text>
    <text class="muted" x="149" y="254">浙江 · 8.0</text>

    <rect class="photo" x="30" y="285" width="96" height="96"/>
    <rect class="photo" x="144" y="285" width="96" height="96"/>
    <text class="text" x="35" y="406">螺丝样品</text>
    <text class="text" x="149" y="406">包装样品</text>
    <text class="muted" x="35" y="427">待整理</text>
    <text class="muted" x="149" y="427">已确认</text>

    <rect class="primary" x="30" y="486" width="210" height="46"/>
    <text class="primaryText" x="99" y="515">继续录入</text>
  </g>
  <text class="h2" x="1135" y="750">样品列表</text>

  <!-- Detail -->
  <g transform="translate(1410,155)" filter="url(#shadow)">
    <rect class="phone" width="270" height="560"/>
    <rect class="screen" x="12" y="12" width="246" height="536"/>
    <text class="h1" x="34" y="58">样品详情</text>

    <rect class="photo" x="55" y="86" width="160" height="150"/>
    <text class="h2" x="34" y="277">前壳样品</text>
    <text class="text" x="34" y="312">规格：20mm</text>
    <text class="text" x="34" y="344">产地：广东</text>
    <text class="text" x="34" y="376">价格：12.5</text>
    <text class="text" x="34" y="408">项目：项目 A</text>
    <text class="text" x="34" y="440">备注：电脑端待确认</text>

    <rect class="secondary" x="30" y="486" width="100" height="46"/>
    <text class="secondaryText" x="65" y="515">编辑</text>
    <rect class="primary" x="140" y="486" width="100" height="46"/>
    <text class="primaryText" x="174" y="515">返回</text>
  </g>
  <text class="h2" x="1480" y="750">详情页</text>

  <!-- Sync center large -->
  <g transform="translate(70,835)" filter="url(#shadow)">
    <rect class="phone" width="270" height="285"/>
    <rect class="screen" x="12" y="12" width="246" height="261"/>
    <text class="h1" x="34" y="58">同步中心</text>
    <rect class="card" x="30" y="82" width="210" height="72"/>
    <text class="text" x="48" y="112">待导出：新增 5 · 修改 2</text>
    <text class="muted" x="48" y="135">上次导入：今天 10:30</text>
    <rect class="primary" x="30" y="174" width="210" height="42"/>
    <text class="primaryText" x="93" y="201">导出给电脑</text>
    <rect class="secondary" x="30" y="226" width="210" height="42"/>
    <text class="secondaryText" x="82" y="253">导入电脑同步包</text>
  </g>

  <!-- Flow summary -->
  <g transform="translate(405,850)">
    <rect class="card" x="0" y="0" width="585" height="235"/>
    <text class="h1" x="28" y="45">推荐手机端交互流程</text>
    <text class="text" x="28" y="88">1. 首页点击“开始录入”，进入新增样品页。</text>
    <text class="text" x="28" y="122">2. 现场先拍照，再填写图片名称、规格、产地、价格、项目。</text>
    <text class="text" x="28" y="156">3. 查看页按项目浏览样品图片，点击图片进入详情。</text>
    <text class="text" x="28" y="190">4. 同步中心一键导出 zip 给电脑，也可导入电脑同步包更新本机。</text>
  </g>

  <g transform="translate(1040,850)">
    <rect class="card" x="0" y="0" width="600" height="235"/>
    <text class="h1" x="28" y="45">界面原则</text>
    <text class="text" x="28" y="88">简洁优先：每个页面只放当前最重要的操作。</text>
    <text class="text" x="28" y="122">采集优先：录入页默认围绕拍照和少量字段展开。</text>
    <text class="text" x="28" y="156">同步清晰：导出给电脑、导入电脑同步包两个按钮分开。</text>
    <text class="text" x="28" y="190">适合打包：按移动端 Web 设计，可直接给 Vue + Capacitor 实现。</text>
  </g>

  <!-- Flow arrows across top row -->
  <path class="line" d="M340 415 C365 415, 380 415, 405 415"/>
  <path class="line" d="M675 415 C700 415, 715 415, 740 415"/>
  <path class="line" d="M1010 415 C1035 415, 1050 415, 1075 415"/>
  <path class="line" d="M1345 415 C1370 415, 1385 415, 1410 415"/>
</svg>
