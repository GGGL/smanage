<svg xmlns="http://www.w3.org/2000/svg" width="1850" height="1180" viewBox="0 0 1850 1180">
  <defs>
    <style>
      .bg { fill: #f3f6fb; }
      .title { font: 800 34px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 16px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .window { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.5; rx: 18; }
      .sidebar { fill: #182536; rx: 18; }
      .sideCut { fill: #182536; }
      .sideTitle { font: 800 22px "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .sideSub { font: 13px "Microsoft YaHei", Arial, sans-serif; fill: #9ca3af; }
      .navActive { fill: #2563eb; rx: 12; }
      .navIdle { fill: transparent; rx: 12; }
      .navActiveText { font: 800 15px "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .navText { font: 700 15px "Microsoft YaHei", Arial, sans-serif; fill: #d1d5db; }
      .content { fill: #f8fafc; rx: 18; }
      .h1 { font: 800 25px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .h2 { font: 800 17px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .text { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .muted { font: 13px "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
      .tiny { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #94a3b8; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.2; rx: 15; }
      .field { fill: #ffffff; stroke: #dbe3ef; stroke-width: 1.2; rx: 11; }
      .selected { fill: #eef4ff; stroke: #dbeafe; stroke-width: 1.2; rx: 13; }
      .primary { fill: #2563eb; rx: 11; }
      .secondary { fill: #eef2ff; rx: 11; }
      .neutral { fill: #f1f5f9; rx: 11; }
      .primaryText { font: 800 14px "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .secondaryText { font: 700 14px "Microsoft YaHei", Arial, sans-serif; fill: #2563eb; }
      .neutralText { font: 700 14px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .tableHead { fill: #f1f5f9; rx: 10; }
      .tableLine { stroke: #e2e8f0; stroke-width: 1; }
      .th { font: 700 13px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .td { font: 13px "Microsoft YaHei", Arial, sans-serif; fill: #334155; }
      .photo { fill: #e2e8f0; rx: 12; }
      .chipBlue { fill: #dbeafe; rx: 12; }
      .chipGreen { fill: #dcfce7; rx: 12; }
      .chipOrange { fill: #ffedd5; rx: 12; }
      .chipTextBlue { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
      .chipTextGreen { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #15803d; }
      .chipTextOrange { font: 12px "Microsoft YaHei", Arial, sans-serif; fill: #c2410c; }
      .overlay { fill: rgba(15, 23, 42, 0.46); }
      .modal { fill: #ffffff; rx: 18; }
      .modalShadow { filter: url(#shadow); }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.2; rx: 16; }
      .noteTitle { font: 800 18px "Microsoft YaHei", Arial, sans-serif; fill: #111827; }
      .noteText { font: 14px "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .flowBox { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.2; rx: 16; }
      .flowText { font: 800 15px "Microsoft YaHei", Arial, sans-serif; fill: #1d4ed8; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1850" height="1180"/>
  <text class="title" x="70" y="68">电脑端项目列表 + 样品详情设计稿</text>
  <text class="subtitle" x="70" y="100">修正交互：左侧只保留“项目”和“导入导出”；主界面为项目列表 → 样品详情；项目内容调整用弹窗。</text>

  <!-- main app -->
  <g transform="translate(70,145)" filter="url(#shadow)">
    <rect class="window" width="1710" height="760"/>
    <rect class="content" x="245" y="0" width="1465" height="760"/>
    <rect class="sidebar" x="0" y="0" width="260" height="760"/>
    <rect class="sideCut" x="230" y="0" width="30" height="760"/>

    <!-- Sidebar only two entries -->
    <text class="sideTitle" x="34" y="58">样品管理</text>
    <text class="sideSub" x="34" y="84">本地整理 · 数据包同步</text>

    <rect class="navActive" x="26" y="128" width="190" height="48"/>
    <text class="navActiveText" x="78" y="158">项目</text>

    <rect class="navIdle" x="26" y="198" width="190" height="48"/>
    <text class="navText" x="70" y="228">导入导出</text>

    <rect x="26" y="610" width="190" height="96" rx="14" fill="#334155" opacity="0.9"/>
    <text class="sideSub" x="45" y="640">当前数据</text>
    <text class="sideSub" x="45" y="666">项目 3 个</text>
    <text class="sideSub" x="45" y="690">样品 28 条</text>

    <!-- Header -->
    <text class="h1" x="300" y="60">项目</text>
    <text class="muted" x="300" y="86">从左侧项目列表选择项目，在右侧查看样品详情；项目资料通过弹窗调整。</text>

    <rect class="field" x="300" y="112" width="480" height="44"/>
    <text class="muted" x="320" y="140">搜索项目、样品名称、规格、产地</text>
    <rect class="secondary" x="800" y="112" width="105" height="44"/>
    <text class="secondaryText" x="835" y="140">筛选</text>

    <rect class="primary" x="1225" y="112" width="135" height="44"/>
    <text class="primaryText" x="1256" y="140">导入手机包</text>
    <rect class="secondary" x="1378" y="112" width="135" height="44"/>
    <text class="secondaryText" x="1408" y="140">导出给手机</text>
    <rect class="neutral" x="1531" y="112" width="105" height="44"/>
    <text class="neutralText" x="1554" y="140">导出Excel</text>

    <!-- main zone -->
    <rect class="card" x="300" y="190" width="360" height="510"/>
    <text class="h2" x="324" y="226">项目列表</text>
    <text class="tiny" x="324" y="250">点击项目切换右侧内容</text>

    <rect class="selected" x="324" y="280" width="312" height="76"/>
    <text class="h2" x="346" y="310">项目 A</text>
    <text class="muted" x="346" y="334">12 条样品 · 今天导入</text>
    <rect class="chipBlue" x="558" y="302" width="58" height="24"/>
    <text class="chipTextBlue" x="570" y="319">选中</text>

    <rect class="card" x="324" y="374" width="312" height="76"/>
    <text class="h2" x="346" y="404">项目 B</text>
    <text class="muted" x="346" y="428">9 条样品 · 已整理</text>

    <rect class="card" x="324" y="468" width="312" height="76"/>
    <text class="h2" x="346" y="498">项目 C</text>
    <text class="muted" x="346" y="522">7 条样品 · 待确认</text>

    <rect class="primary" x="324" y="590" width="145" height="40"/>
    <text class="primaryText" x="360" y="616">新建项目</text>
    <rect class="neutral" x="491" y="590" width="145" height="40"/>
    <text class="neutralText" x="526" y="616">调整项目</text>

    <!-- Sample detail main -->
    <rect class="card" x="690" y="190" width="945" height="510"/>
    <text class="h2" x="714" y="226">项目 A · 样品详情</text>
    <text class="muted" x="714" y="250">该区域展示选中项目内的样品，可点击行查看右侧详情或直接编辑。</text>

    <rect class="tableHead" x="714" y="280" width="585" height="42"/>
    <text class="th" x="736" y="306">图片</text>
    <text class="th" x="820" y="306">名称</text>
    <text class="th" x="970" y="306">规格</text>
    <text class="th" x="1080" y="306">价格</text>
    <text class="th" x="1170" y="306">状态</text>

    <line class="tableLine" x1="714" y1="344" x2="1299" y2="344"/>
    <rect class="photo" x="736" y="358" width="48" height="42"/>
    <text class="td" x="820" y="384">前壳样品</text>
    <text class="td" x="970" y="384">20mm</text>
    <text class="td" x="1080" y="384">12.5</text>
    <rect class="chipOrange" x="1170" y="364" width="62" height="24"/>
    <text class="chipTextOrange" x="1182" y="381">待确认</text>

    <line class="tableLine" x1="714" y1="418" x2="1299" y2="418"/>
    <rect class="photo" x="736" y="432" width="48" height="42"/>
    <text class="td" x="820" y="458">后壳样品</text>
    <text class="td" x="970" y="458">18mm</text>
    <text class="td" x="1080" y="458">8.0</text>
    <rect class="chipGreen" x="1170" y="438" width="62" height="24"/>
    <text class="chipTextGreen" x="1182" y="455">已确认</text>

    <line class="tableLine" x1="714" y1="492" x2="1299" y2="492"/>
    <rect class="photo" x="736" y="506" width="48" height="42"/>
    <text class="td" x="820" y="532">螺丝样品</text>
    <text class="td" x="970" y="532">M3</text>
    <text class="td" x="1080" y="532">0.2</text>
    <rect class="chipBlue" x="1170" y="512" width="62" height="24"/>
    <text class="chipTextBlue" x="1182" y="529">已同步</text>

    <!-- right details within sample detail -->
    <line class="tableLine" x1="1325" y1="250" x2="1325" y2="660"/>
    <text class="h2" x="1350" y="282">选中样品</text>
    <rect class="photo" x="1370" y="306" width="190" height="140"/>
    <text class="text" x="1350" y="482">名称：前壳样品</text>
    <text class="text" x="1350" y="512">规格：20mm</text>
    <text class="text" x="1350" y="542">产地：广东</text>
    <text class="text" x="1350" y="572">价格：12.5</text>
    <rect class="secondary" x="1350" y="612" width="105" height="40"/>
    <text class="secondaryText" x="1380" y="638">编辑</text>
    <rect class="primary" x="1472" y="612" width="105" height="40"/>
    <text class="primaryText" x="1502" y="638">保存</text>
  </g>

  <!-- interaction flow -->
  <g transform="translate(70,950)">
    <rect class="flowBox" x="0" y="0" width="210" height="58"/>
    <text class="flowText" x="72" y="36">项目列表</text>
    <path class="arrow" d="M220 29 C250 29, 265 29, 295 29"/>
    <rect class="flowBox" x="305" y="0" width="230" height="58"/>
    <text class="flowText" x="386" y="36">样品详情</text>
    <path class="arrow" d="M545 29 C575 29, 590 29, 620 29"/>
    <rect class="flowBox" x="630" y="0" width="300" height="58"/>
    <text class="flowText" x="708" y="36">弹出窗口调整项目内容</text>
  </g>

  <!-- Modal demo -->
  <g transform="translate(1065,895)" filter="url(#shadow)">
    <rect class="modal" x="0" y="0" width="650" height="240"/>
    <text class="h1" x="32" y="48">调整项目内容</text>
    <text class="muted" x="32" y="76">从项目列表点击“调整项目”后弹出，不离开当前页面。</text>

    <text class="muted" x="32" y="112">项目名称</text>
    <rect class="field" x="32" y="124" width="270" height="42"/>
    <text class="text" x="50" y="151">项目 A</text>

    <text class="muted" x="332" y="112">客户 / 备注</text>
    <rect class="field" x="332" y="124" width="270" height="42"/>
    <text class="text" x="350" y="151">客户名称</text>

    <rect class="neutral" x="350" y="186" width="110" height="40"/>
    <text class="neutralText" x="379" y="212">取消</text>
    <rect class="primary" x="492" y="186" width="110" height="40"/>
    <text class="primaryText" x="522" y="212">保存</text>
  </g>

  <!-- notes -->
  <g transform="translate(70,1035)">
    <rect class="note" x="0" y="0" width="910" height="95"/>
    <text class="noteTitle" x="24" y="36">修正点</text>
    <text class="noteText" x="24" y="68">左侧只保留两个栏目：项目、导入导出。主界面不再单独设置“样品”和“备份记录”入口，避免流程分散。</text>
  </g>
</svg>
